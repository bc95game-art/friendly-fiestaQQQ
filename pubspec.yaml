name: daewoo_remote_pro
description: "کنترل هوشمند دوو - مدل ۱۳۶۳ (نسخه رایگان، بدون تبلیغات)"
publish_to: 'none'
version: 2.2.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # مدیریت مجوزهای رانتایم (بلوتوث، مادون‌قرمز)
  permission_handler: ^11.3.1

  # ذخیره‌ی آدرس آخرین دستگاه بلوتوثی متصل‌شده — برای اتصال خودکار بدون
  # نیاز به لمس دستی هر بار که اپ باز می‌شود (رفع باگ «اتصال خودکار»).
  shared_preferences: ^2.2.3

  # ✔ حذف‌شده: flutter_blue_plus (BLE/GATT) — این پکیج برای اتصال به
  # کنترل بلوتوثی واقعی دوو استفاده نمی‌شد و فقط با UUIDهای ساختگی/فرضی کار
  # می‌کرد (هیچ‌وقت واقعاً وصل نمی‌شد). به‌جای آن، گوشی با پروفایل استاندارد
  # اندروید BluetoothHidDevice مستقیماً خودش را به‌عنوان کیبورد/کنترل
  # بلوتوثی به تلویزیون معرفی می‌کند (کد نیتیو در MainActivity.kt).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # ⚠️ فونت Vazirmatn به‌صورت پیش‌فرض غیرفعال است چون فایل‌های آن در این پروژه
  # وجود ندارند — قبلاً همین بخش فعال بود ولی چون فایل‌ها نبودند، دستور
  # `flutter pub get` / build با خطای «unable to find asset» متوقف می‌شد (باگ رفع‌شده).
  # اگر فونت را از fonts.google.com/specimen/Vazirmatn دانلود کردید و در
  # assets/fonts/ گذاشتید، کامنت‌های زیر را بردارید:
  # fonts:
  #   - family: Vazirmatn
  #     fonts:
  #       - asset: assets/fonts/Vazirmatn-Regular.ttf
  #       - asset: assets/fonts/Vazirmatn-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Vazirmatn-Bold.ttf
  #         weight: 700

# نکته: هیچ پکیج تبلیغاتی (AdMob / AppLovin / Tapsell / Facebook Ads)
# و هیچ پکیج پرداخت/اشتراک (Poolakey / in_app_purchase) در این نسخه وجود ندارد.
