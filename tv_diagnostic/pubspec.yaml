name: daewoo_tv_diagnostic
description: "ابزار تشخیصی روی خودِ تلویزیون — نمایش زنده‌ی کلیدهای واقعی دریافتی و وضعیت اتصال بلوتوث، برای دیباگ ریموت هوشمند دوو."
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # اشتراک‌گذاری لاگ متنی از طریق هر اپی که روی تلویزیون نصب است
  share_plus: ^8.0.0

  # ذخیره‌ی دائمی نگاشت‌های ضبط‌شده — حتا بعد از خاموش شدن تلویزیون
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
